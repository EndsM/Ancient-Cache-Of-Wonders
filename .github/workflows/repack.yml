name: Repack Mod for Release

on:
  # Allows you to trigger this workflow manually from the Actions tab
  workflow_dispatch:
  push:
    branches:
      - master

concurrency:
  # Cancels in-progress runs if push multiple times in a row quickly
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  build-repack:
    # Need write permissions to manage tags and releases
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Extract Mod Name from descriptor.mod
        id: extract_name
        run: |
          # Regex matches 'name = "ModName"' and extracts 'ModName'
          MOD_NAME=$(grep -oP 'name\s*=\s*"\K[^"]+' descriptor.mod | head -n 1)

          # Fallback to repo name if descriptor.mod parse fails
          if [ -z "$MOD_NAME" ]; then
            MOD_NAME="${{ github.event.repository.name }}"
          fi

          echo "Parsed Mod Name: $MOD_NAME"
          echo "MOD_NAME=$MOD_NAME" >> $GITHUB_ENV

      - name: Create Repack Structure
        run: |
          # 1. Create the repack output directories
          mkdir -p "repack/$MOD_NAME"

          # 2. Copy all files/folders to the subfolder, excluding the repack folder itself
          rsync -arv --exclude='repack' ./ "repack/$MOD_NAME/"

          # 3. Copy descriptor.mod to the base of the repack directory
          cp descriptor.mod "repack/$MOD_NAME.mod"

      - name: Remove Development Files and Folders
        run: |
          cd "repack/$MOD_NAME"

          # Delete development folders
          rm -rf .git .vscode .github

          # Delete development files by extension
          find . -type f \( -name "*.exe" -o -name "*.py" -o -name ".gitignore" -o -name ".gitattributes" -o -name "*.kra" \) -delete

      - name: Upload Repack as GitHub Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MOD_NAME }}-repack
          path: repack/
          compression-level: 9

      - name: Create ZIP Archive for Release
        run: |
          cd repack
          # Zips both the folder and the .mod file together
          zip -r "${{ env.MOD_NAME }}.zip" ./*

      - name: Delete older AutoBuild release and tag
        # Use native GitHub CLI to delete the old tag and release before creating the new one
        run: |
          gh release delete AutoBuild --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Pre-Release (AutoBuild)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: AutoBuild
          name: "AutoBuild"
          body: |
            ## Continuous AutoBuild
            **Commit:** `${{ github.sha }}`

            This pre-release is automatically generated on every push to the `master` branch. It contains the latest repacked code.
          draft: false
          prerelease: true
          files: repack/${{ env.MOD_NAME }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
