l_english:
  zone_starcage_world_core_jobs_delta: "Delta Production Center"
  zone_starcage_world_core_jobs_delta_desc: "With our newly developed delta level production technologies, we can boost our old starcage worlds to fit the new age's standard."

  zone_starcage_world_core_buildings_delta: "Delta Construction Center"
  zone_starcage_world_core_buildings_delta_desc: "New age requires faster construction, there are no time to waste in the path to create really magnificent starcage."

  zone_starcage_world_core_amenities_delta: "Delta Unity Center"
  zone_starcage_world_core_amenities_delta_desc: "Equip our starcage world capital with fancy new delta standard living condition and bureaucracy establishments, this way we can truly hold control on such magnificent structure."

  zone_star_guardian_core_fortress_delta: "Delta Fortress Center"
  zone_star_guardian_core_fortress_delta_desc: "As new age comes, we will need to replace our old guards on Star Guardian with superior elites who are equiped with finest we can supply in delta age."

  zone_star_guardian_core_order_delta: "Delta Order Center"
  zone_star_guardian_core_order_delta_desc: "As we arrived at this new age, we must understand that our defense is hard to be break from outside, so we must ensure we also strengthen our defense towards inside."
