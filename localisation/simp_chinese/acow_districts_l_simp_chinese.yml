l_simp_chinese:
 zone_starcage_world_core_jobs_delta: "Delta生产中心"
 zone_starcage_world_core_jobs_delta_desc: "有了我们新开发的Delta级生产技术，我们可以提升我们的旧星笼世界以适应新时代的标准。"
 zone_starcage_world_core_buildings_delta: "Delta建设中心"
 zone_starcage_world_core_buildings_delta_desc: "新的时代需要更快的建设，没有时间可以浪费在创造真正宏伟的星笼世界的路上。"
 zone_starcage_world_core_amenities_delta: "Delta凝聚中心"
 zone_starcage_world_core_amenities_delta_desc: "给我们的星笼世界装备新的上流Delta级生活标准和官僚设施，这样我们才真正可以掌握这宏伟的结构。"
 zone_star_guardian_core_fortress_delta: "Delta堡垒中心"
 zone_star_guardian_core_fortress_delta_desc: "随着新时代到来，我们需要替代我们在星空守护者上旧有的卫士以更加强大的、装备Delta时代最好装备的精英。"
 zone_star_guardian_core_order_delta: "Delta秩序中心"
 zone_star_guardian_core_order_delta_desc: "随着我们进入新的时代，我们必须清楚我们的防御从外部是难以贯穿的，因此我们必须确保我们还加强对内的防御。"
 zone_star_guardian_secondary_energy_delta: "Delta能源中心"
 zone_star_guardian_secondary_energy_delta_desc: "After we switch our fortresses to new and powerful dark matter/energy based ones, we feel the constrain more than ever. But no more need of redirect energies across different systems, we can now produce more energy than a whole star here."
 zone_star_guardian_secondary_alloys_delta: "Delta冶金中心"
 zone_star_guardian_secondary_alloys_delta_desc: "If we want our Star Guardian to hold here forever, we will need to be able to produce equipments here and now."
 zone_star_guardian_secondary_fortress_delta: "Delta堡垒中心"
 zone_star_guardian_secondary_fortress_delta_desc: "As new age comes, we will need to replace our old guards on Star Guardian with superior elites who are equiped with finest we can supply in delta age."
 zone_star_guardian_secondary_order_delta: "Delta秩序中心"
 zone_star_guardian_secondary_order_delta_desc: "As we arrived at this new age, we must understand that our defense is hard to be break from outside, so we must ensure we also strengthen our defense towards inside."
